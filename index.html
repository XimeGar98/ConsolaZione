<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Izcalli Heat</title>

<style>

body{
margin:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

img{
max-width:100vw;
max-height:100vh;
cursor:pointer;
}

</style>
</head>

<body>

<img id="foto" src="home.jpg" onclick="cambiarImagen()">

<script>

let estado = 1;

function cambiarImagen(){

if(estado === 1){
document.getElementById("foto").src = "perfil.jpg";
estado = 2;
}else{
document.getElementById("foto").src = "home.jpg";
estado = 1;
}

}

</script>

</body>
</html>
